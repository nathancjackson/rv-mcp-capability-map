<style>

*{box-sizing:border-box;}body{margin:0;background:var(--page);color:var(--text-primary);font-family:var(--font-sans);line-height:1.5;}
.wrap{max-width:880px;margin:0 auto;padding:28px 20px 60px;}button{font-family:inherit;}a{color:var(--text-success);}
input{font-family:inherit;font-size:15px;padding:10px 12px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-2);color:var(--text-primary);width:100%;}
#gate{max-width:360px;margin:12vh auto 0;text-align:center;}
#unlock{margin-top:10px;width:100%;padding:10px;border-radius:var(--radius);border:0.5px solid var(--text-primary);background:var(--text-primary);color:var(--surface-2);font-size:14px;cursor:pointer;}

</style>

<script>
(function(){
var CFG=window.CFG;
function b64(s){var bin=atob(s);var u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
var gate=document.getElementById('gate'),err=document.getElementById('gerr'),inp=document.getElementById('pw'),btn=document.getElementById('unlock');
function E(t,s,h){var d=document.createElement(t);if(s)d.style.cssText=s;if(h!=null)d.innerHTML=h;return d;}
function T(t,s,x){var d=document.createElement(t);if(s)d.style.cssText=s;if(x!=null)d.textContent=x;return d;}
var C={yes:'var(--yes)',partial:'var(--partial)',no:'var(--no)'};
var TINT={yes:'var(--bg-success)',partial:'var(--bg-warning)',no:'var(--bg-danger)'};
var TXT={yes:'var(--text-success)',partial:'var(--text-warning)',no:'var(--text-danger)'};
var PRSTYLE={MERGED:{bg:'var(--bg-merged)',fg:'var(--text-merged)',ic:'ti-git-merge'},OPEN:{bg:'var(--bg-success)',fg:'var(--text-success)',ic:'ti-git-pull-request'},CLOSED:{bg:'var(--bg-danger)',fg:'var(--text-danger)',ic:'ti-git-pull-request-closed'}};
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function tidy(s){var NL=String.fromCharCode(10),S=String.fromCharCode(1);return (s==null?'':String(s)).replace(/\r/g,'').replace(/\n[ \t]*\n+/g,S).replace(/[ \t]*\n[ \t]*/g,' ').split(S).join(NL+NL);}
var GD=null,_brief=null;
function secLabel(txt){return E('div','font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;',txt);}
function domainCtx(dom){var d=GD&&GD.domains&&GD.domains[dom];if(!d)return '';var s=d.read_instructions||'';if(d.mode==='full'&&d.write_instructions)s+=(s?' ':'')+d.write_instructions;return s;}
function globalBriefing(){if(_brief)return _brief;var NL=String.fromCharCode(10);var parts=[];Object.keys(GD.domains).forEach(function(k){var d=GD.domains[k];if(!d.mode||d.mode==='disabled')return;var s=d.read_instructions||'';if(d.mode==='full'&&d.write_instructions)s+=(s?' ':'')+d.write_instructions;if(s)parts.push(s);});_brief=(GD.mcpPreamble||'')+parts.join(NL+NL);return _brief;}
function schemaOf(t){var props={},req=[];(t.params||[]).forEach(function(p){var ty=p.type||'';var base=ty.indexOf('bool')>=0?'boolean':(ty.indexOf('int')>=0?'integer':(ty.indexOf('float')>=0?'number':(ty.indexOf('list')>=0?'array':'string')));var sch=ty.indexOf('None')>=0?{anyOf:[{type:base},{type:'null'}]}:{type:base};if(p.desc)sch.description=p.desc;if(p.required){req.push(p.name);}else if(p.default!=null){var d=p.default;if(d==='None')sch['default']=null;else if(d==='True')sch['default']=true;else if(d==='False')sch['default']=false;else if(d!==''&&!isNaN(Number(d)))sch['default']=Number(d);else sch['default']=String(d).replace(/^['"]+|['"]+$/g,'');}props[p.name]=sch;});return {name:t.name,description:tidy(t.desc),inputSchema:{type:'object',properties:props,required:req}};}
function preToggle(parent,label,getText){var b=T('button',null,label);b.style.cssText='font-size:11.5px;background:transparent;border:0.5px solid var(--border-strong);color:var(--text-secondary);border-radius:6px;padding:3px 9px;cursor:pointer;margin-top:7px;';var pre=null;b.onclick=function(ev){ev.stopPropagation();if(pre){pre.remove();pre=null;return;}pre=E('pre','margin:6px 0 0;padding:9px 11px;background:var(--surface-2);border:0.5px solid var(--border);border-radius:6px;font-size:11px;line-height:1.55;overflow-x:auto;white-space:pre-wrap;color:var(--text-secondary);');pre.textContent=getText();b.after(pre);};parent.appendChild(b);}
function initials(s){var p=(s||'?').replace(/[^A-Za-z ]/g,' ').trim().split(/\s+/);return ((p[0]||'?')[0]+(p.length>1?p[p.length-1][0]:'')).toUpperCase();}
function rel(d){if(!d)return '';var t=Date.parse(d);if(isNaN(t))return '';var s=(Date.now()-t)/1000;if(s<3600)return Math.max(1,Math.round(s/60))+'m';if(s<86400)return Math.round(s/3600)+'h';if(s<2592000)return Math.round(s/86400)+'d';if(s<31536000)return Math.round(s/2592000)+'mo';return Math.round(s/31536000)+'y';}
function monthLabel(iso){var t=new Date(iso);if(isNaN(t.getTime()))return '';var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return M[t.getUTCMonth()]+' '+t.getUTCFullYear();}
function countBadge(n){return '<span style="font-size:10.5px;font-weight:600;min-width:16px;text-align:center;padding:1px 6px;border-radius:9px;background:var(--surface-1);color:var(--text-muted);border:0.5px solid var(--border);margin-left:2px;">'+n+'</span>';}
function slideToggle(el,chev){
  if(el.dataset.o==='1'){el.style.maxHeight=el.scrollHeight+'px';requestAnimationFrame(function(){el.style.maxHeight='0px';});el.dataset.o='0';if(chev)chev.textContent='▸';}
  else{el.dataset.o='1';if(chev)chev.textContent='▾';el.style.maxHeight=el.scrollHeight+'px';var fin=function(){if(el.dataset.o==='1')el.style.maxHeight='none';};el.addEventListener('transitionend',fin,{once:true});setTimeout(fin,340);}
}
var byName={};
async function tryUnlock(pw){try{var e=new TextEncoder();var km=await crypto.subtle.importKey('raw',e.encode(pw),{name:'PBKDF2'},false,['deriveKey']);var k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(CFG.salt),iterations:CFG.iter,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(CFG.iv)},k,b64(CFG.ct));var data=JSON.parse(new TextDecoder().decode(pt));data.tools.forEach(function(t){byName[t.name]=t;});try{sessionStorage.setItem('rvpw',pw);}catch(x){}gate.style.display='none';document.getElementById('app').style.display='block';render(data);return true;}catch(x){return false;}}
btn.onclick=async function(){btn.disabled=true;err.textContent='Checking…';var ok=await tryUnlock(inp.value);if(!ok){err.textContent='Wrong password. Try again.';btn.disabled=false;}};
inp.addEventListener('keydown',function(ev){if(ev.key==='Enter')btn.click();});
var cached=null;try{cached=sessionStorage.getItem('rvpw');}catch(x){}if(cached){tryUnlock(cached);}

function opBadge(op){var wr=op==='write';return '<span style="font-size:10.5px;padding:1px 7px;border-radius:9px;background:'+(wr?'var(--bg-warning)':'var(--bg-success)')+';color:'+(wr?'var(--text-warning)':'var(--text-success)')+';">'+op+'</span>';}
function expBadge(t){var lab=t.exposed?'exposed':(t.mode==='disabled'?'off':'suppressed');return '<span style="font-size:10.5px;padding:1px 7px;border-radius:9px;border:0.5px solid var(--border);color:'+(t.exposed?'var(--text-success)':'var(--text-muted)')+';">'+lab+'</span>';}
function toolCard(t){
  var w=E('div','border:0.5px solid var(--border);border-radius:8px;margin:6px 0;overflow:hidden;background:var(--surface-1);');
  var head=E('div','display:flex;align-items:center;gap:9px;padding:8px 10px;cursor:pointer;');
  head.appendChild(E('span','width:8px;height:8px;border-radius:2px;flex:none;background:'+(t.op==='write'?'var(--partial)':'var(--yes)')+';'));
  var hl=E('div','flex:1;min-width:0;');
  hl.appendChild(T('code','font-size:12.5px;color:var(--text-primary);word-break:break-all;',t.name));
  if(t.label)hl.appendChild(T('div','font-size:11.5px;color:var(--text-muted);',t.label));
  head.appendChild(hl);
  head.appendChild(E('span',null,expBadge(t)));
  var chev=T('span','color:var(--text-muted);font-size:12px;width:12px;text-align:center;','▸');head.appendChild(chev);
  var body=E('div','max-height:0;overflow:hidden;transition:max-height .25s;');
  var inner=E('div','padding:0 10px 10px;');
  var live=!!t.exposed;
  if(!live){var offDom=(t.mode==='disabled');inner.appendChild(E('div','background:'+(offDom?'var(--bg-danger)':'var(--bg-warning)')+';border-radius:6px;padding:8px 11px;margin:2px 0 10px;font-size:12px;line-height:1.55;color:'+(offDom?'var(--text-danger)':'var(--text-warning)')+';','<i class="ti ti-eye-off" style="vertical-align:-2px;margin-right:5px;"></i><b>The AI never sees this tool.</b> '+(offDom?'Its entire domain ('+esc(t.domain)+') is disabled for MCP.':'It exists in code, but the MCP config filters write tools out of this read-only domain ('+esc(t.domain)+').')+' It is not in the menu sent to the AI, and calls to it are blocked. Enabling it is a one-line config change.'));}
  var secA=E('div','border-left:3px solid '+(live?'var(--yes)':'var(--border-strong)')+';padding-left:10px;margin-top:2px;');
  secA.appendChild(secLabel(live?'What the AI is told about this tool':'What the AI would be told — currently hidden'));
  secA.appendChild(T('div','font-size:13px;color:var(--text-secondary);line-height:1.55;white-space:pre-wrap;',tidy(t.desc)||'(no description in code)'));
  if(t.params&&t.params.length){
    secA.appendChild(T('div','font-size:11.5px;color:var(--text-muted);margin:9px 0 2px;',(live?'Parameters the AI can fill (':'Parameters the AI could fill (')+t.params.length+')'));
    var pc=E('div','border-left:2px solid var(--border);padding-left:10px;');
    t.params.forEach(function(p){
      var row=E('div','padding:3px 0;border-top:0.5px solid var(--border);');
      var top=E('div','display:flex;gap:7px;align-items:baseline;flex-wrap:wrap;');
      top.appendChild(T('code','font-size:12px;color:var(--text-primary);',p.name));
      if(p.type)top.appendChild(T('code','font-size:11px;color:var(--text-muted);',p.type));
      top.appendChild(T('span','font-size:10px;color:'+(p.required?'var(--text-warning)':'var(--text-muted)')+';',p.required?'required':'optional'));
      row.appendChild(top);
      if(p.desc)row.appendChild(T('div','font-size:12px;color:var(--text-secondary);line-height:1.45;margin-top:1px;',p.desc));
      pc.appendChild(row);
    });

  var xb=document.createElement('button');xb.innerHTML='<i class="ti ti-x"></i>';xb.style.cssText='border:none;background:transparent;color:var(--text-muted);font-size:16px;cursor:pointer;';xb.onclick=function(){panel.style.display='none';};head.appendChild(xb);
  panel.appendChild(head);
  var banner=E('div','display:none;background:var(--bg-warning);color:var(--text-warning);font-size:11.5px;padding:7px 12px;line-height:1.45;','<i class="ti ti-alert-triangle" style="vertical-align:-2px;margin-right:4px;"></i>Live test calls the REAL Rentvine MCP — including write tools. It asks before writing; still, be careful.');

  function bubble(role,text){

  function status(text){var s=T('div','align-self:flex-start;font-size:11.5px;color:var(--text-muted);font-style:italic;',text);msgs.appendChild(s);msgs.scrollTop=msgs.scrollHeight;}
  function statusTool(name){
    var s=E('div','align-self:flex-start;display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-muted);');
    var ic=document.createElement('i');ic.className='ti ti-settings-bolt';ic.style.cssText='font-size:13px;';

  function send(){
    if(st.busy)return;var q=inp.value.trim();if(!q)return;

        }
        return pump();
      });}
      return pump();
    }).catch(function(e){asst.textContent='Could not reach the chat backend. Chat runs on the Cloudflare site (rv-mcp-capability-map.pages.dev), not the GitHub mirror.';finish();});
    function finish(){st.busy=false;sbtn.disabled=false;}
